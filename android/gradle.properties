# Project-wide Gradle settings.

# ── JVM heap: 4 GB avoids GC thrash during R8 full-mode ──────────────────────
org.gradle.jvmargs=-Xmx4096m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8

# ── AndroidX ──────────────────────────────────────────────────────────────────
android.useAndroidX=true

# ── Build performance ─────────────────────────────────────────────────────────
# Parallel task execution (uses all CPU cores)
org.gradle.parallel=true
# Configuration cache avoids re-evaluating build scripts on repeat runs
org.gradle.configuration-cache=true
# Gradle daemon keeps the JVM warm between builds
org.gradle.daemon=true
# On-demand configuration — only configure projects that are needed
org.gradle.configureondemand=true

# ── R8 / D8 full-mode (smaller & faster code than ProGuard) ──────────────────
android.enableR8.fullMode=true

# ── Disable IDE-injected Gradle init scripts ─────────────────────────────────
org.gradle.java.installations.auto-detect=false
